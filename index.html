<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة قصف جبهات التفاعلية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #ff4757;
        }
        h1 {
            color: #ff4757;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .chat-box {
            background-color: #2e2e2e;
            padding: 15px;
            border-radius: 10px;
            min-height: 80px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            border-left: 5px solid #2ed573;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #3a3a3a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus {
            border: 1px solid #ff4757;
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🤖 لعبة قصف جبهات</h1>
    
    <div class="chat-box" id="botResponse">
        اكتب كلمة بالخانة جوة وخلينا نشوف حظك! 😉
    </div>

    <div class="input-group">
        <input type="text" id="userInput" placeholder="اكتب كلمة مثل: بيت...">
        <button onclick="playGame()">إرسال</button>
    </div>
</div>

<script>
function playGame() {
    const inputField = document.getElementById('userInput');
    const responseBox = document.getElementById('botResponse');
    const word = inputField.value.trim();

    // قائمة الردود الجاهزة على كلمات محددة
    const specialResponses = {
        "بيت": "بيت؟ عبالي قصر! لو تشتريلك عقل وتطلع من بيتكم القديم مو أحسن؟ 🏠💥",
        "مدرسة": "المدرسة للذكاء.. أنت شموديك هناك بالغلط؟ 🏫😂",
        "فلوس": "تتكلم عن الفلوس وجيبك مابي حتى كروة باص؟ 💵💀"
    };

    // قائمة جبهات عشوائية إذا كتب كلمة ثانية
    const randomGhabahat = [
        "قصف ثلاثي الأبعاد! جبهتك طارت لغير قارة 🚀💨",
        "لو تجمع حچيك هذا كله وتبيعه ما تشتري بيه ربع ثقة من اللي عندك! 😂",
        "الكلام ببللاش، بس جبهتك هسة صارت بمليون! 💥",
        "حاول مرة أخرى، جبهتك هسة قيد الصيانة 🛠️💀"
    ];

    if (word === "") {
        responseBox.style.borderLeftColor = "#ffa502";
        responseBox.innerText = "اكتبلك كلمة أول شي، لا تخاف! 😎";
        return;
    }

    // التحقق إذا الكلمة موجودة بالقائمة الخاصة
    if (specialResponses[word]) {
        responseBox.style.borderLeftColor = "#ff4757";
        responseBox.innerText = specialResponses[word];
    } else {
        // اختيار قصف عشوائي
        const randomIndex = Math.floor(Math.random() * randomGhabahat.length);
        responseBox.style.borderLeftColor = "#ffa502";
        responseBox.innerText = randomGhabahat[randomIndex];
    }

    // تفريغ الخانة بعد الإرسال
    inputField.value = "";
}

// تشغيل الإرسال عند الضغط على زر Enter بالكيبورد
document.getElementById('userInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        playGame();
    }
});
</script>

</body>
</html>
